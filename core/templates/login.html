<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — hone-core</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <link rel="stylesheet" href="/static/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/static/adminlte.min.css">
  <link rel="stylesheet" href="/static/app.css?v={{ asset_v('app.css') }}">
  <style>
    /* AdminLTE sets .card-title { float: left } for its widget cards.
       On standalone auth pages the title must stack normally above the form. */
    .card-title { float: none !important; }
  </style>
  <script>
    (function () {
      var t = localStorage.getItem("hone-theme")
        || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-bs-theme", t);
    })();
  </script>
</head>
<body class="login-page bg-body-tertiary">

<div class="card shadow-sm" style="width: 100%; max-width: 400px;">
  <div class="card-body p-4">
    <h4 class="card-title text-center mb-4 fw-light">
      <span class="fw-semibold">hone-core</span> — sign in
    </h4>

    {% if error %}
    <div class="alert alert-warning py-2 small">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">

      {{ csrf_field(request) }}
      <input type="hidden" name="next" value="{{ next }}">
      <div class="mb-3">
        <label for="email" class="form-label small">Email</label>
        <input type="email" class="form-control" id="email" name="email"
               autocomplete="username" required autofocus>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label small">Password</label>
        <input type="password" class="form-control" id="password" name="password"
               autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>

    {% if google_enabled %}
    <hr class="my-3">
    <a href="/auth/google{% if next %}?next={{ next | urlencode }}{% endif %}"
       class="btn btn-outline-secondary w-100 d-flex align-items-center justify-content-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Continue with Google
    </a>
    {% endif %}

    <div class="text-center mt-3 small text-muted">
      No account? <a href="/register">Request access</a>
    </div>
  </div>
</div>

<script src="/static/bootstrap.bundle.min.js"></script>
</body>
</html>
