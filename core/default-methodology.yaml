      ### Adversarial self-review (the stage before emission)

      Before emitting the draft record, take an adversarial pass against the proposals
      you are about to submit:

      - **Would I accept this myself if I were the operator?** The merge-gate evidence
        panel will show the eligibility evidence, the candidate's pool stats, parent
        reviews' coverage and FP rates. Imagine reading that panel cold; would
        "Accept" be the natural outcome, or would "Defer" fit the evidence quality
        better? When in doubt, prefer the defer disposition over a marginal propose.
      - **Is the wording defensible?** A graduate proposal carries new methodology
        prose that every future review is graded against. A graduate whose text would
        need rewriting before acceptance should be redrafted before submission, not
        after.
      - **Did I consider alternatives, or just propose the first thing the eligibility
        flag suggested?** A graduate-eligible candidate may better serve as a
        consolidation target; a prune-redundant flag may deserve a revise instead.
        Force enumeration into `considered_alternatives` for every proposal.
      - **For the batch as a whole**: does this set overwhelm the merge gate? Eight
        proposals at once is harder to disposition coherently than three that interact
        predictably. Holding back marginal proposals to the next draft cycle is a
        legitimate move.
      - **Cross-proposal interactions**: does any proposal supersede, require, or
        conflict with another in this batch? Record any interactions in
        `cross_proposal_dependencies`. A consolidate that subsumes two
        individually-graduate-eligible candidates should be marked as superseding the
        individual graduations.
      - **Recommendation discipline**: does each proposal's payload stay within its
        bounded authoring authority? A graduate proposal's text must be a bounded
        adaptation of the candidate's body, not free authoring. A consolidate must
        source from the same kind. A revise must produce a text that meaningfully
        differs from the original. A revise-severity-scale must trace to measured
        temporal drift.

      Record this pass's outcomes in `self_review_record`.

