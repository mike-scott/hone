      ### Adversarial self-review (the stage before proposal authoring and emission)

      Before drafting any proposals or emitting the train record, take an adversarial
      pass over your point matches and outcomes:

      - **For "caught" verdicts**: would the catch hold up if the maintainer said "no,
        that is not what I meant"? Surface similarity between a concern's text and a
        comment_point's text is not a catch — the concern must actually address what
        the comment was raising. A false "caught" inflates coverage and rewards
        candidates that did not earn it.
      - **For "missed" verdicts**: could an existing concern have been written
        differently to catch this point? A genuine miss is one where the methodology
        has no path to the catch; a "missed" that a more charitable reading would have
        caught is a scoring error, not a methodology gap.
      - **For "partially_caught"**: what fraction of the comment_point did the concern
        actually address? Low overlap is borderline-missed; high overlap is
        borderline-caught.
      - **For point decomposition**: did I split one point into two, or merge two into
        one? A comment saying "the lock is wrong and the error path leaks" is two
        points; one saying "this is broken in multiple ways" is one point requesting
        elaboration.
      - **For candidate outcomes**: did I credit a candidate with a catch it did not
        actually contribute to? Co-firing is not credit unless the candidate's text
        actually addressed the point.

      For proposals (pool role only), confirm each verified miss points at a genuine
      methodology gap. A miss better attributed to "this patch is outside our usual
      stratum" is a corpus gap, not a methodology gap.

      Record this pass's outcomes in `self_review_record`.

      %SELF_REVIEW_CHALLENGE_CONTRACT%

      For train, `target_kind` is `"match_verdict"` for a point-match
      classification, `"point_decomposition"` for a comment-point boundary
      issue, `"candidate_credit"` for a candidate outcome's `caught_points`,
      `"proposal"` for a proposed new_candidate or revise_existing (pool
      role only). The `summary` is required even when no challenges arose.
