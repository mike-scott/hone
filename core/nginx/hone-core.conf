# hone-core — nginx reverse proxy / TLS terminator (HOST nginx).
#
# nginx runs on the host (not in a container) and terminates TLS for
# https://core.example.com:8000/. hone-core runs in Docker and publishes a
# plain-HTTP socket on the loopback interface (127.0.0.1:8001 by default — see
# core/docker-compose.yml); this config proxies to it.
#
# Install: copy to /etc/nginx/conf.d/hone-core.conf (or sites-available + a
# symlink into sites-enabled), then `sudo nginx -t && sudo systemctl reload nginx`.
# It is included inside the http{} block, so the map/upstream below are valid.
#
# Pairs with these hone-core settings (core/.env):
#   HONE_SERVE_TLS=false               # serve plain HTTP + trust proxy headers
#   HONE_SESSION_COOKIE_SECURE=false   # cookie survives the plain-HTTP backend hop
#   HONE_PUBLIC_URL=https://core.example.com:8000
#   HONE_HOSTNAME=core.example.com

# WebSocket / connection-upgrade passthrough. hone-core is plain request/
# response today, but this keeps the proxy correct if it ever upgrades.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream hone_core {
    # >>> EDIT THIS LINE per deployment <<<
    # Point at hone-core's loopback-published plain-HTTP port. It must match
    # HONE_BACKEND_PORT in core/docker-compose.yml (default 8001). nginx does
    # not expand environment variables, so this is a literal you set by hand —
    # an example value, not a hard-coded contract.
    server 127.0.0.1:8001;
    keepalive 16;
}

server {
    # Public HTTPS edge — the port operators and nodes reach.
    listen 8000 ssl;
    listen [::]:8000 ssl;
    http2 on;

    server_name core.example.com;

    # --- TLS (nginx owns it now) -------------------------------------------
    # Real cert for core.example.com. Paths below assume certbot/Let's Encrypt;
    # adjust if you keep certs elsewhere. Nodes validate against the CA they
    # were enrolled with — if they were enrolled under hone-core's own CA,
    # re-enroll them against this cert's chain.
    ssl_certificate     /etc/letsencrypt/live/core.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/core.example.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:hone_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — only safe because everything under this name is HTTPS.
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Source archives / patchset uploads can be large; don't let nginx clip
    # them with the stock 1m default.
    client_max_body_size 200m;

    location / {
        proxy_pass http://hone_core;
        proxy_http_version 1.1;

        # Preserve the original request context. X-Forwarded-Proto is the one
        # hone-core's session/redirect logic cares about — it tells the backend
        # the *client* spoke HTTPS even though this hop is HTTP.
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Forwarded-Port  $server_port;

        # WebSocket upgrade passthrough.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Review / gather operations can run long — don't cut them at 60s.
        proxy_connect_timeout 10s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering       off;
    }

    # Liveness probe — keep it cheap and unlogged.
    location = /healthz {
        proxy_pass http://hone_core;
        proxy_set_header Host $host;
        access_log off;
    }
}

# -----------------------------------------------------------------------------
# Wiring (core/docker-compose.yml and core/main.py are already done to match
# this file). What's left:
#
# 1. core/.env
#      HONE_SERVE_TLS=false
#      HONE_SESSION_COOKIE_SECURE=false
#      HONE_PUBLIC_URL=https://core.example.com:8000
#      HONE_HOSTNAME=core.example.com
#    (and HONE_BACKEND_PORT if you moved the backend off 8001)
#
# 2. Install this file into the host nginx (see header) and reload.
#
# 3. Make sure the host firewall allows :8000 inbound, and that nothing else on
#    the host is already bound to :8000.
#
# Client IP: core/main.py starts uvicorn with proxy_headers=True and
# forwarded_allow_ips="*", so the X-Forwarded-* headers set above are trusted.
# That is safe because the backend is published on 127.0.0.1 only — host nginx
# is the sole client that can reach it.
# -----------------------------------------------------------------------------
