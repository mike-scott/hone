# hone-core — the control-plane service, deployed on its own (one instance).
#
#   cd core && cp .env.example .env     # fill in the secrets
#   docker compose up --build
#
# The build context is the project root (..) because the image needs
# common/. TLS is terminated upstream; this serves plain HTTP on
# $HONE_HTTP_PORT. hone-node is a separate deployment — see node/.

name: hone-core

services:
  hone-core:
    build:
      context: ..                        # project root — the build needs common/
      dockerfile: core/Dockerfile
    image: hone-core
    restart: unless-stopped
    ports:
      - "${HONE_HTTP_PORT:-8000}:8000"    # plain HTTP — put a TLS ingress in front
    environment:
      HONE_FLEET_SECRET: "${HONE_FLEET_SECRET:?set it in .env}"
      HONE_ADMIN_TOKEN:  "${HONE_ADMIN_TOKEN:?set it in .env}"
    volumes:
      - hone-core-data:/data             # db, config, methodology files, source archives

volumes:
  hone-core-data:
