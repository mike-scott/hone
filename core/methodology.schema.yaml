# methodology.schema.yaml — JSON Schema (draft 2020-12) for a hone
# methodology document.
#
# Validates `default-methodology.yaml` and any exported / imported methodology.
# Every property carries a `description`, so this schema doubles as the
# functional specification of the methodology format.
#
# Validate:
#   python3 -c "import yaml,jsonschema; \
#     jsonschema.validate(yaml.safe_load(open('default-methodology.yaml')), \
#                         yaml.safe_load(open('methodology.schema.yaml')))"
#
# Two invariants this schema deliberately enforces structurally:
#   - `checks` entries forbid an `order` field (additionalProperties: false) —
#     checks are an unordered set, processed in any order, by design.
#   - every object is closed (additionalProperties: false) — a stray or
#     misspelled key fails validation rather than being silently ignored.
#
# Two checks JSON Schema cannot express, left to the importer:
#   - id uniqueness within `principles` / `stages` / `checks`;
#   - referential integrity of `checks[].stage` against `stages[].id`.

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "urn:hone:methodology-schema"
title: hone methodology
description: >-
  A patch-review methodology — the principles, stages, and bug-class checks a
  review node applies to a kernel patch. The canonical copy is DB-resident and
  versioned; this schema validates the YAML file form (the import / export
  representation, and the `default-methodology.yaml` seed).

type: object
additionalProperties: false
required:
  - name
  - version
  - description
  - principles
  - stages
  - checks
  - documentation_review
  - report_finalization

properties:

  name:
    type: string
    minLength: 1
    description: Human-readable name of the methodology.

  version:
    type: integer
    minimum: 1
    description: >-
      Monotonic methodology version. hone-core bumps it on every
      accepted merge-gate change; the seed file is version 1.

  description:
    type: string
    minLength: 1
    description: >-
      Why the methodology exists and what it is for — motivating prose for a
      human reader. Not an operative instruction a node executes.

  principles:
    type: array
    minItems: 1
    description: >-
      The foundational review stances. Principles are unconditionally in force
      and are NOT a rankable set — they carry no priority or weight. They are
      operator-only: a review node can never add or alter a principle. Ids
      must be unique within this list.
    items:
      $ref: "#/$defs/principle"

  stages:
    type: array
    minItems: 1
    description: >-
      The ordered macro-structure of a review (0 -> 1 -> 2 -> 3 -> S). Unlike
      checks, stages ARE a sequence. Operator-only: a node cannot add or alter
      a stage. Ids must be unique within this list.
    items:
      $ref: "#/$defs/stage"

  checks:
    type: array
    minItems: 1
    description: >-
      The bug-class checks — an UNORDERED set, each an independent analysis
      applied in any order (a node may even parallelise them). A graduated
      candidate practice becomes a new check here; checks are the only part of
      the methodology a node can grow (via the merge gate). Ids must be unique
      within this list.
    items:
      $ref: "#/$defs/check"

  documentation_review:
    type: object
    additionalProperties: false
    required: [title, body]
    description: The review procedure specific to documentation patches.
    properties:
      title:
        type: string
        minLength: 1
        description: Section title.
      body:
        type: string
        minLength: 1
        description: The documentation-review procedure, in full.

  report_finalization:
    type: object
    additionalProperties: false
    required: [body, severity_scale]
    description: >-
      How to convert the staged analysis into the delivered review, plus the
      severity scale every finding is tagged against.
    properties:
      body:
        type: string
        minLength: 1
        description: The report-finalization procedure, in full.
      severity_scale:
        type: array
        minItems: 1
        description: The severity tags a finding may carry, most severe first.
        items:
          $ref: "#/$defs/severity"

$defs:

  slug:
    type: string
    pattern: "^[a-z][a-z0-9]*(?:-[a-z0-9]+)*$"
    description: >-
      A kebab-case identifier — starts with a lowercase letter, then lowercase
      letters and digits in single-hyphen-separated words. Meaningful and
      unbounded, so ids stay readable and scale to hundreds of checks; the
      leading-letter rule also rules out opaque ordinals like `2a`.

  principle:
    type: object
    additionalProperties: false
    required: [id, title, body]
    description: One foundational review stance.
    properties:
      id:
        $ref: "#/$defs/slug"
        description: >-
          Stable slug id, e.g. `trailers-are-not-evidence`. Referenced by name
          from methodology prose and from review output.
      title:
        type: string
        minLength: 1
        description: Short principle title.
      body:
        type: string
        minLength: 1
        description: The principle, stated in full.

  stage:
    type: object
    additionalProperties: false
    required: [id, title, applies, body]
    description: One stage of the ordered review macro-structure.
    properties:
      id:
        type: string
        pattern: "^[0-9A-Za-z]+$"
        description: >-
          Short stage id (`0`, `1`, `2`, `3`, `S`). Stages are an ordered,
          stable set, so ids stay terse and ordinal.
      title:
        type: string
        minLength: 1
        description: Stage title.
      applies:
        type: string
        minLength: 1
        description: One line stating which patches this stage applies to.
      body:
        type: string
        minLength: 1
        description: The stage procedure, in full.

  check:
    type: object
    additionalProperties: false   # forbids `order` — checks are unordered by design
    required: [id, stage, title, body]
    description: >-
      One bug-class check. Order-independent: a check carries no `order` /
      priority field — anything with a real processing-order dependency must
      be a stage, not a check.
    properties:
      id:
        $ref: "#/$defs/slug"
        description: >-
          Stable slug id, e.g. `object-lifetime`. A graduated candidate keeps
          its slug, so a candidate practice and the check it becomes share one
          id.
      stage:
        type: string
        pattern: "^[0-9A-Za-z]+$"
        description: >-
          Id of the stage this check runs under. Must match a `stages[].id`
          (referential integrity is enforced by the importer, not this schema).
      title:
        type: string
        minLength: 1
        description: Short check title.
      body:
        type: string
        minLength: 1
        description: The check, stated in full.

  severity:
    type: object
    additionalProperties: false
    required: [tag, meaning, blocks_merge]
    description: One level of the finding-severity scale.
    properties:
      tag:
        type: string
        enum: [critical, major, moderate, minor, nit]
        description: The severity tag.
      meaning:
        type: string
        minLength: 1
        description: What a finding at this severity means.
      blocks_merge:
        type: boolean
        description: Whether a finding at this severity blocks the merge.
